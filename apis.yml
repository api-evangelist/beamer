apis:
  - aid: beamer:beamer
    name: Beamer API
    description: >-
      The Beamer REST API provides programmatic access to changelog posts, user
      management, segmentation, and notification feeds. Key endpoints include unread
      count retrieval, post creation and management, user profile updates, and
      segment management. Authentication uses an API key from Beamer settings.
    humanURL: https://www.getbeamer.com/api
