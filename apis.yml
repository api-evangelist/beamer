aid: beamer
name: Beamer
description: >-
  Beamer is a changelog and notification center tool for announcing product updates,
  new features, and API changes to end users. It provides an embeddable feed widget,
  push notifications, email digests, and a public changelog page. The Beamer REST API
  enables programmatic management of posts, users, segments, and notification delivery.
  Beamer is now part of the Userflow product suite. The API uses API key authentication
  and supports OpenAPI specifications and Postman collections.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
